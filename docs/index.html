<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Text Drop</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Static long text link maker</p>
      <h1>긴 글을 링크 하나로 옮기세요.</h1>
      <p class="sub">GitHub Pages에서 서버 없이 동작합니다. 글은 서버에 저장하지 않고, 브라우저에서 압축해 링크의 <code>#</code> 부분에 담습니다.</p>
    </section>

    <section class="card compose" aria-labelledby="compose-title">
      <div class="card-head">
        <h2 id="compose-title">새 링크 만들기</h2>
        <span id="counter" class="counter">0자</span>
      </div>
      <label>
        제목 <span class="muted">선택</span>
        <input id="title" maxlength="120" placeholder="예: 인증 메모">
      </label>
      <label>
        내용
        <textarea id="text" spellcheck="false" placeholder="여기에 긴 글을 붙여넣으세요. 링크를 받은 쪽은 같은 페이지에서 바로 열고 전체 복사할 수 있습니다."></textarea>
      </label>
      <div class="row wrap">
        <label class="inline">
          자동 만료 표시
          <select id="ttlHours">
            <option value="0">안 함</option>
            <option value="1">1시간 뒤</option>
            <option value="6">6시간 뒤</option>
            <option value="24" selected>24시간 뒤</option>
            <option value="72">3일 뒤</option>
          </select>
        </label>
        <button id="upload" class="primary">링크 만들기</button>
      </div>
      <p class="note">주의: 링크 자체에 내용이 들어갑니다. 서버 저장/서버 삭제는 없고, 링크를 아는 사람은 내용을 볼 수 있습니다.</p>
    </section>

    <section id="result" class="card result hidden" aria-live="polite"></section>

    <section class="card list" aria-labelledby="list-title">
      <div class="card-head">
        <h2 id="list-title">이 브라우저에 저장한 링크</h2>
        <button id="refresh" class="ghost">새로고침</button>
      </div>
      <div id="items" class="items"></div>
    </section>
  </main>

  <template id="item-template">
    <article class="item">
      <div>
        <h3></h3>
        <p class="meta"></p>
      </div>
      <button class="ghost open">열기</button>
    </article>
  </template>

  <dialog id="viewer">
    <div class="dialog-head">
      <div>
        <h2 id="viewer-title"></h2>
        <p id="viewer-meta" class="meta"></p>
      </div>
      <button id="close" class="icon" aria-label="닫기">×</button>
    </div>
    <textarea id="viewer-text" spellcheck="false"></textarea>
    <div class="row wrap actions">
      <button id="copy" class="primary">전체 복사</button>
      <button id="share" class="ghost">링크 복사</button>
      <button id="delete" class="danger">이 브라우저에서 삭제</button>
    </div>
    <p class="note">삭제는 현재 브라우저의 저장 목록에서만 제거합니다. 이미 복사한 링크는 별도로 폐기할 수 없습니다.</p>
  </dialog>

  <script src="./app.js" type="module"></script>
</body>
</html>
